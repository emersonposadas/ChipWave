<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-TZPD8R77TZ"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag("js", new Date());

    gtag("config", "G-TZPD8R77TZ");
  </script>
  <title>ChipWave NSF Visualizer</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app shell">
    <header class="topbar" aria-label="Estado de la aplicación">
      <div class="brandBlock">
        <h1>ChipWave</h1>
      </div>

      <div class="statusCard" role="status" aria-live="polite">
        <span id="statusDot" aria-hidden="true"></span>
        <div>
          <span class="statusLabel">Estado</span>
          <strong id="statusText">Listo</strong>
        </div>
      </div>
    </header>

    <section class="workspace" aria-label="Controles y visualizadores">
      <aside class="sidebar" aria-label="Panel de control">
        <section class="panel transportPanel primaryPlayer">
          <div class="nowPlaying" aria-live="polite">
            <span id="playerTitle">Cargando catálogo...</span>
            <small class="playerContext">NSF · 5 canales en vivo</small>
            <canvas id="playerScope" width="640" height="96" aria-hidden="true"></canvas>
          </div>

          <div class="transport controls" aria-label="Controles de reproducción">
            <button id="previousBtn" class="iconBtn transportIcon previousIcon" disabled type="button" aria-label="Track anterior"></button>
            <button id="playBtn" class="playBtn mainPlayBtn transportIcon playIcon" disabled type="button" aria-label="Reproducir"></button>
            <button id="pauseBtn" class="iconBtn transportIcon pauseIcon" disabled type="button" aria-label="Pausar"></button>
            <button id="stopBtn" class="iconBtn transportIcon stopIcon" disabled type="button" aria-label="Detener"></button>
            <button id="randomTransportBtn" class="iconBtn transportIcon randomIcon" disabled type="button" aria-label="Random"></button>
            <button id="nextBtn" class="iconBtn transportIcon nextIcon" disabled type="button" aria-label="Track siguiente"></button>
          </div>

          <div class="quickActions" aria-label="Compartir y favoritos">
            <button id="favoriteBtn" class="secondaryBtn actionIcon favoriteIcon" type="button" disabled aria-label="Guardar favorito"></button>
            <button id="shareBtn" class="secondaryBtn actionIcon shareIcon" type="button" disabled aria-label="Compartir"></button>
            <button id="embedBtn" class="secondaryBtn actionIcon embedIcon" type="button" disabled aria-label="Mostrar código embed"></button>
          </div>

          <label class="fieldLabel" for="trackSelect">Track</label>
          <select id="trackSelect" disabled></select>

          <label class="rangeLabel volume" for="volume">
            <span>Volumen <output id="volumeValue" for="volume">75%</output></span>
            <input id="volume" type="range" min="0" max="1" value="0.75" step="0.01" />
          </label>
        </section>

        <section class="panel primaryPanel">
          <select id="catalogSelect" aria-label="Catálogo de juegos">
            <option value="">No hay archivos cargados</option>
          </select>

          <select id="favoritesSelect" aria-label="Favoritos">
            <option value="">Sin favoritos</option>
          </select>
        </section>

        <section class="panel viewPanel">
          <div class="panelHeader">
            <div>
              <p class="sectionKicker">Visualización</p>
              <h2>Onda</h2>
            </div>
          </div>

          <label class="fieldLabel" for="waveCycles">Zoom temporal</label>
          <select id="waveCycles" aria-label="Zoom temporal de la onda">
            <option value="1">Amplio</option>
            <option value="3" selected>Medio</option>
            <option value="5">Cerca</option>
            <option value="10">Detalle</option>
          </select>
          <label class="switch waveStatic" for="waveStatic">
            <input id="waveStatic" type="checkbox" />
            <span class="switchTrack" aria-hidden="true"></span>
            <span>
              <strong>Onda estática</strong>
              <small>Congela la forma.</small>
            </span>
          </label>

          <button id="unmuteAllBtn" class="fullBtn secondaryBtn" type="button">Activar todos los canales</button>
        </section>

      </aside>

      <section class="mainStage" aria-label="Visualizadores de onda">
        <section class="visualizers">
          <article class="channel" data-channel="0">
            <div class="channelHead">
              <div><h2>Pulse 1</h2></div>
              <button class="muteBtn" type="button" data-mute-channel="0" aria-pressed="false">Mute</button>
            </div>
            <canvas id="ch0" width="1200" height="320"></canvas>
            <p id="readout0">—</p>
          </article>

          <article class="channel" data-channel="1">
            <div class="channelHead">
              <div><h2>Pulse 2</h2></div>
              <button class="muteBtn" type="button" data-mute-channel="1" aria-pressed="false">Mute</button>
            </div>
            <canvas id="ch1" width="1200" height="320"></canvas>
            <p id="readout1">—</p>
          </article>

          <article class="channel" data-channel="2">
            <div class="channelHead">
              <div><h2>Triangle</h2></div>
              <button class="muteBtn" type="button" data-mute-channel="2" aria-pressed="false">Mute</button>
            </div>
            <canvas id="ch2" width="1200" height="320"></canvas>
            <p id="readout2">—</p>
          </article>

          <article class="channel" data-channel="3">
            <div class="channelHead">
              <div><h2>Noise</h2></div>
              <button class="muteBtn" type="button" data-mute-channel="3" aria-pressed="false">Mute</button>
            </div>
            <canvas id="ch3" width="1200" height="320"></canvas>
            <p id="readout3">—</p>
          </article>

          <article class="channel wide" data-channel="4">
            <div class="channelHead">
              <div><h2>DPCM / Mix</h2></div>
              <button class="muteBtn" type="button" data-mute-channel="4" aria-pressed="false">Mute</button>
            </div>
            <canvas id="ch4" width="1200" height="320"></canvas>
            <p id="readout4">—</p>
          </article>
        </section>
      </section>
    </section>
  </main>

  <dialog id="embedDialog" class="embedDialog" aria-labelledby="embedDialogTitle">
    <form method="dialog" class="embedBox">
      <div class="embedHeader">
        <div>
          <p class="sectionKicker">Embed</p>
          <h2 id="embedDialogTitle">Insertar canción</h2>
        </div>
        <button class="iconBtn closeIcon" value="close" type="submit" aria-label="Cerrar"></button>
      </div>

      <label class="fieldLabel" for="embedCode">Código</label>
      <textarea id="embedCode" readonly spellcheck="false"></textarea>

      <div class="embedActions">
        <button id="copyEmbedBtn" class="secondaryBtn copyBtn" type="button">Copiar</button>
      </div>
    </form>
  </dialog>

  <script>
    window.__chipwaveBuild = "v32-2026-06-03";
    window.__gmeRuntimeReady = new Promise((resolve, reject) => {
      window.__resolveGmeRuntime = resolve;
      window.__rejectGmeRuntime = reject;
    });

    window.Module = {
      locateFile(path) {
        if (path.endsWith(".wasm")) return "vendor/" + path + "?v=" + window.__chipwaveBuild;
        return path;
      },
      onRuntimeInitialized() {
        window.Module.runtimeInitialized = true;
        if (typeof window.__resolveGmeRuntime === "function") {
          window.__resolveGmeRuntime();
        }
      },
      print(text) {
        console.log("[libgme]", text);
      },
      printErr(text) {
        console.error("[libgme]", text);
      }
    };
  </script>
  <script src="vendor/libgme.js?v=v32-2026-06-03"></script>
  <script src="app.js?v=v32-2026-06-03"></script>
</body>
</html>
