  name: Build libgme for browser

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-libgme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout app repo
        uses: actions/checkout@v4

      - name: Setup Emscripten
        uses: emscripten-core/setup-emsdk@v14
        with:
          version: latest

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y git cmake ninja-build python3

      - name: Clone Game_Music_Emu
        run: |
          rm -rf _gme
          git clone --depth 1 https://github.com/libgme/game-music-emu.git _gme

      - name: Build libgme.js and libgme.wasm
        run: |
          mkdir -p vendor

          emcc \
            _gme/gme/*.cpp \
            -I_gme/gme \
            -O3 \
            -s WASM=1 \
            -s MODULARIZE=0 \
            -s ENVIRONMENT=web \
            -s ALLOW_MEMORY_GROWTH=1 \
            -s EXPORTED_RUNTIME_METHODS='["ccall","cwrap","getValue","setValue","allocate","ALLOC_STATIC"]' \
            -s EXPORTED_FUNCTIONS='[
              "_malloc",
              "_free",
              "_gme_open_data",
              "_gme_start_track",
              "_gme_play",
              "_gme_delete",
              "_gme_track_ended",
              "_gme_ignore_silence",
              "_gme_voice_count",
              "_gme_mute_voice",
              "_gme_mute_voices"
            ]' \
            -o vendor/libgme.js

      - name: Commit vendor build
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add vendor/libgme.js vendor/libgme.wasm
          git commit -m "Build browser libgme with real mute support" || echo "No changes"
          git push
