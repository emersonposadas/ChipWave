name: Build libgme for browser

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-libgme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout app repo
        uses: actions/checkout@v4

      - name: Setup Emscripten
        uses: emscripten-core/setup-emsdk@v14
        with:
          version: latest

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y git cmake ninja-build python3

      - name: Clone Game_Music_Emu
        run: |
          rm -rf _gme _gme-build
          git clone --depth 1 https://github.com/libgme/game-music-emu.git _gme

      - name: Configure Game_Music_Emu with CMake
        run: |
          emcmake cmake -S _gme -B _gme-build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_FLAGS="-D__EMSCRIPTEN__=1 -DBLARGG_LITTLE_ENDIAN=1" \
            -DCMAKE_C_FLAGS="-D__EMSCRIPTEN__=1 -DBLARGG_LITTLE_ENDIAN=1" \
            -DBUILD_SHARED_LIBS=OFF

      - name: Build Game_Music_Emu static library
        run: |
          cmake --build _gme-build --config Release

          echo "Built files:"
          find _gme-build -maxdepth 5 -type f | sort

          LIBGME="$(find _gme-build -name 'libgme.a' -o -name 'libgme*.a' | head -n 1)"

          if [ -z "$LIBGME" ]; then
            echo "Could not find libgme.a"
            exit 1
          fi

          echo "LIBGME=$LIBGME" >> "$GITHUB_ENV"
          echo "Using $LIBGME"

      - name: Link browser libgme.js and libgme.wasm
        run: |
          mkdir -p vendor

          emcc \
            -Wl,--whole-archive "$LIBGME" -Wl,--no-whole-archive \
            -O3 \
            -s WASM=1 \
            -s MODULARIZE=0 \
            -s ENVIRONMENT=web \
            -s ALLOW_MEMORY_GROWTH=1 \
            -s ERROR_ON_UNDEFINED_SYMBOLS=0 \
            -s EXPORTED_RUNTIME_METHODS='["ccall","cwrap","getValue","setValue","allocate","ALLOC_STATIC"]' \
            -s EXPORTED_FUNCTIONS='[
              "_malloc",
              "_free",
              "_gme_open_data",
              "_gme_start_track",
              "_gme_play",
              "_gme_delete",
              "_gme_track_ended",
              "_gme_ignore_silence",
              "_gme_voice_count",
              "_gme_mute_voice",
              "_gme_mute_voices"
            ]' \
            -o vendor/libgme.js

          test -f vendor/libgme.js
          test -f vendor/libgme.wasm

      - name: Verify exported mute symbol
        run: |
          grep -q "gme_mute_voice" vendor/libgme.js && echo "gme_mute_voice appears in libgme.js" || {
            echo "Warning: gme_mute_voice string not found in libgme.js"
          }

      - name: Commit vendor build
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add vendor/libgme.js vendor/libgme.wasm
          git commit -m "Build browser libgme with real mute support" || echo "No changes"
          git push
