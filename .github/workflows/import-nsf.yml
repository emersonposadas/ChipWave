name: Import NSF

on:
  workflow_dispatch:
    inputs:
      nsf_url:
        description: "URL directa .nsf/.nsfe/.zip o página de Zophar con 'Download original music files'"
        required: true
        type: string
      filename:
        description: "Nombre final opcional, ejemplo smb3.nsf"
        required: false
        type: string

permissions:
  contents: write

jobs:
  import-nsf:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download, extract if needed, validate and update catalog
        shell: python
        env:
          INPUT_URL: ${{ inputs.nsf_url }}
          INPUT_FILENAME: ${{ inputs.filename }}
        run: |
          from pathlib import Path
          from urllib.request import Request, urlopen
          from urllib.parse import urljoin, urlparse, unquote
          from datetime import datetime, timezone
          import json
          import os
          import re
          import shutil
          import zipfile

          nsf_dir = Path("nsf")
          nsf_dir.mkdir(exist_ok=True)

          work_dir = Path("_import_tmp")
          if work_dir.exists():
              shutil.rmtree(work_dir)
          work_dir.mkdir()

          source_url = os.environ["INPUT_URL"].strip()
          requested_name = os.environ.get("INPUT_FILENAME", "").strip()

          def fetch(url: str) -> bytes:
              req = Request(
                  url,
                  headers={
                      "User-Agent": "Mozilla/5.0 GitHubActions NSF Importer",
                      "Accept": "*/*",
                  },
              )
              with urlopen(req, timeout=60) as response:
                  return response.read()

          def filename_from_url(url: str) -> str:
              path = unquote(urlparse(url).path)
              name = Path(path).name
              return name or "download"

          def safe_name(name: str) -> str:
              name = name.strip().lower()
              name = re.sub(r"[^a-z0-9._-]+", "-", name)
              name = name.strip("-._")
              return name or "imported"

          def is_zip_bytes(data: bytes) -> bool:
              return data[:4] == b"PK\x03\x04"

          def is_nsf_bytes(data: bytes) -> bool:
              return len(data) >= 128 and data[:5] == b"NESM\x1a"

          def resolve_page_if_needed(url: str) -> str:
              lower_path = urlparse(url).path.lower()
              if lower_path.endswith((".nsf", ".nsfe", ".zip")):
                  return url

              html_bytes = fetch(url)
              html = html_bytes.decode("utf-8", errors="replace")

              hrefs = re.findall(r'href=["\']([^"\']+)["\']', html, flags=re.I)
              candidates = []

              for href in hrefs:
                  full = urljoin(url, href)
                  lower = full.lower()

                  if lower.endswith((".nsf", ".nsfe")):
                      candidates.append((0, full))
                  elif lower.endswith(".zip") and "soundfiles" in lower and "mp3" not in lower:
                      candidates.append((1, full))
                  elif lower.endswith(".zip") and "zophar" in lower and "mp3" not in lower:
                      candidates.append((2, full))
                  elif lower.endswith(".zip") and "mp3" not in lower:
                      candidates.append((3, full))

              if not candidates:
                  raise SystemExit(
                      "No encontré un enlace .nsf/.nsfe/.zip en la página. "
                      "Usa una URL directa o una página de Zophar con 'Download original music files'."
                  )

              candidates.sort(key=lambda x: x[0])
              return candidates[0][1]

          resolved_url = resolve_page_if_needed(source_url)
          print(f"Resolved URL: {resolved_url}")

          blob = fetch(resolved_url)

          # Important:
          # Use the resolved URL's extension for the temporary file.
          # The optional filename is only applied after ZIP extraction/NSF validation.
          resolved_name = safe_name(filename_from_url(resolved_url))
          if not Path(resolved_name).suffix:
              if is_zip_bytes(blob):
                  resolved_name += ".zip"
              elif is_nsf_bytes(blob):
                  resolved_name += ".nsf"

          downloaded = work_dir / resolved_name
          downloaded.write_bytes(blob)

          if downloaded.suffix.lower() == ".zip" or is_zip_bytes(blob):
              try:
                  with zipfile.ZipFile(downloaded) as zf:
                      names = [
                          n for n in zf.namelist()
                          if n.lower().endswith((".nsf", ".nsfe")) and not n.endswith("/")
                      ]
                      names = [n for n in names if "__macosx" not in n.lower()]

                      if not names:
                          raise SystemExit("El ZIP no contiene archivos .nsf/.nsfe.")

                      names.sort(key=lambda n: (len(Path(n).name), n.lower()))
                      chosen = names[0]

                      extracted_name = safe_name(Path(chosen).name)
                      extracted_nsf = work_dir / extracted_name
                      extracted_nsf.write_bytes(zf.read(chosen))

                      print(f"Extracted NSF from ZIP: {chosen}")
              except zipfile.BadZipFile:
                  raise SystemExit("La descarga parece ZIP por nombre/cabecera, pero no es un ZIP válido.")
          else:
              extracted_nsf = downloaded

          data = extracted_nsf.read_bytes()

          if not is_nsf_bytes(data):
              preview = data[:80]
              raise SystemExit(
                  f"{extracted_nsf.name} is not a valid NSF file. "
                  f"First bytes: {preview!r}"
              )

          def read_ascii(start, length):
              raw = data[start:start+length].split(b"\x00", 1)[0]
              return raw.decode("latin-1", errors="replace").strip()

          if requested_name:
              final_name = safe_name(requested_name)
              if not final_name.endswith((".nsf", ".nsfe")):
                  final_name += ".nsf"
          else:
              final_name = safe_name(extracted_nsf.name)
              if not final_name.endswith((".nsf", ".nsfe")):
                  final_name += ".nsf"

          final_path = nsf_dir / final_name
          final_path.write_bytes(data)

          imported_at = datetime.now(timezone.utc).isoformat()
          item = {
              "filename": final_path.name,
              "path": final_path.as_posix(),
              "title": read_ascii(14, 32) or final_path.stem,
              "artist": read_ascii(46, 32) or "Unknown",
              "songs": data[6],
              "startSong": data[7],
              "sourceUrl": source_url,
              "resolvedUrl": resolved_url,
              "importedAt": imported_at,
          }

          catalog_path = nsf_dir / "catalog.json"
          if catalog_path.exists():
              catalog = json.loads(catalog_path.read_text(encoding="utf-8"))
          else:
              catalog = {"updatedAt": None, "items": []}

          items = [x for x in catalog.get("items", []) if x.get("path") != item["path"]]
          items.append(item)
          items.sort(key=lambda x: (x.get("title") or x.get("filename") or "").lower())

          catalog["updatedAt"] = imported_at
          catalog["items"] = items
          catalog_path.write_text(json.dumps(catalog, indent=2, ensure_ascii=False), encoding="utf-8")

          print(f"Imported: {final_path}")
          print(f"Title: {item['title']}")
          print(f"Artist: {item['artist']}")
          print(f"Songs: {item['songs']}")

          shutil.rmtree(work_dir)

      - name: Commit imported NSF
        shell: bash
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add nsf/
          git commit -m "Import NSF" || echo "No changes to commit"
          git push
